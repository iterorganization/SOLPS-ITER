# Data for triangular mesh for Eirene
# version : 17.02.2015

# the directory where the grid is located
[ -z "$TRIADIR" ] && TRIADIR=$SOLPSTOP/data/TRIANG/$DEVICE

# the directory where the templates are located
[ -z "$CNVTRIOUT" ] && CNVTRIOUT=$SOLPSTOP/data/DivGeo/class/$DEVICE

# the file stem
